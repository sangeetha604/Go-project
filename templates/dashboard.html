<!DOCTYPE html>
<html>

<head>

<title>Dashboard</title>

<script src="https://cdn.tailwindcss.com"></script>

<script src="/static/js/script.js"></script>

<style>

/* ---------- animated gradient background ---------- */

.animated-bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:linear-gradient(-45deg,#020817,#1e3a8a,#020817,#0ea5e9);
background-size:400% 400%;
animation:gradientMove 12s ease infinite;
z-index:0;
}

@keyframes gradientMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}


/* ---------- animated tech grid ---------- */

.grid{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background-image:
linear-gradient(rgba(59,130,246,0.15) 1px, transparent 1px),
linear-gradient(90deg, rgba(59,130,246,0.15) 1px, transparent 1px);
background-size:60px 60px;
animation:gridMove 10s linear infinite;
pointer-events:none;
z-index:1;
}

@keyframes gridMove{
0%{transform:translateY(0);}
100%{transform:translateY(60px);}
}


/* ---------- floating glow lights ---------- */

.glow1{
position:fixed;
width:400px;
height:400px;
background:#2563eb;
border-radius:50%;
filter:blur(120px);
opacity:0.3;
animation:float1 12s ease-in-out infinite;
z-index:1;
}

.glow2{
position:fixed;
right:0;
bottom:0;
width:400px;
height:400px;
background:#06b6d4;
border-radius:50%;
filter:blur(120px);
opacity:0.3;
animation:float2 15s ease-in-out infinite;
z-index:1;
}

@keyframes float1{
0%{transform:translate(-100px,-50px);}
50%{transform:translate(300px,200px);}
100%{transform:translate(-100px,-50px);}
}

@keyframes float2{
0%{transform:translate(100px,50px);}
50%{transform:translate(-300px,-200px);}
100%{transform:translate(100px,50px);}
}


/* ---------- button glow ---------- */

button{
transition:0.3s;
box-shadow:0 0 10px rgba(59,130,246,0.3);
}

button:hover{
transform:translateY(-5px) scale(1.05);
box-shadow:0 0 20px #3b82f6,0 0 40px #2563eb;
}

</style>

</head>

<body class="bg-[#020817] text-white min-h-screen flex flex-col items-center justify-center overflow-hidden">

<div class="animated-bg"></div>
<div class="grid"></div>
<div class="glow1"></div>
<div class="glow2"></div>

<h1 class="text-4xl mb-10 relative z-10">Dashboard</h1>

<div class="flex gap-8 relative z-10">

<button onclick="window.location.href='/create'"
class="bg-blue-600 p-6 rounded">
Create Classroom
</button>

<button onclick="window.location.href='/join'"
class="bg-blue-600 p-6 rounded">
Join Classroom
</button>

</div>

</body>

</html>
