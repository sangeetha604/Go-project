<!DOCTYPE html>
<html>

<head>

<title>Signup</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="stylesheet" href="/static/css/style.css">

<script src="/static/js/script.js" defer></script>

</head>

<body class="flex items-center justify-center min-h-screen bg-black text-white">

<div class="bg-zinc-900 p-8 rounded-xl w-96 border border-zinc-800">

<h1 class="text-2xl mb-4 text-center">Create Account</h1>

<input type="text" placeholder="Name"
class="w-full p-3 mb-3 bg-zinc-800 rounded outline-none">

<input type="email" placeholder="Email"
class="w-full p-3 mb-3 bg-zinc-800 rounded outline-none">

<input type="password" placeholder="Password"
class="w-full p-3 mb-3 bg-zinc-800 rounded outline-none">

<button onclick="signup()" class="w-full bg-blue-600 hover:bg-blue-700 p-3 rounded transition">
Sign Up
</button>

<p class="mt-4 text-sm text-center">
Already have an account?
<a href="/login" class="text-blue-400">Login</a>
</p>

</div>

</body>

</html>
